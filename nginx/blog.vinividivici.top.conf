# nginx site example for blog.vinividivici.top.
# Keep this server block on TCP 443. Hysteria2 continues to use UDP 443.

server {
    listen 80;
    listen [::]:80;
    server_name blog.vinividivici.top;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name blog.vinividivici.top;

    ssl_certificate /opt/certs/cert.pem;
    ssl_certificate_key /opt/certs/key.pem;

    root /var/www/blog;
    index index.html;

    location /sub/ {
        proxy_pass http://127.0.0.1:8443;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /rss.xml {
        try_files /rss.xml =404;
        add_header Content-Type application/rss+xml;
    }

    location = /robots.txt {
        try_files /robots.txt =404;
    }

    location = /sitemap.xml {
        try_files /sitemap.xml =404;
    }

    location /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /posts/ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /404.html;
}
